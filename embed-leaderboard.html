<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fanatics Long Ball Jackpot — Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root {
    --bg:#f0efe9;--white:#fff;--border:#b8b8b2;--border-light:#ddddd8;
    --text:#111;--muted:#5a5a54;--muted2:#8a8a84;
    --accent:#00c358;--accent-dark:#007a38;--accent-bg:#e6f9ee;
    --amber:#7a4f00;--amber-bg:#fdf5e4;
    --ui:'IBM Plex Sans Condensed',sans-serif;--mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:auto;overflow:visible;}
  body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px;}
  .hdr{background:var(--white);border-bottom:2px solid var(--text);padding:9px 12px;display:flex;align-items:center;gap:10px;}
  .an-logo{height:15px;}
  .hdr-title{font-family:var(--ui);font-size:14px;font-weight:700;}
  .hdr-title em{color:var(--accent-dark);font-style:normal;}
  .hdr-right{margin-left:auto;font-size:9px;color:var(--muted);text-align:right;line-height:1.5;text-transform:uppercase;letter-spacing:0.07em;}
  .ctrl{background:var(--white);border-bottom:1px solid var(--border);padding:7px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .ctrl-lbl{font-size:9px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);}
  select,input[type=date]{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:11px;padding:4px 7px;outline:none;}
  select:focus,input:focus{border-color:var(--accent);}
  .search-bar{padding:8px 12px;background:var(--bg);border-bottom:1px solid var(--border-light);}
  .search-input{width:100%;background:var(--white);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px;padding:6px 10px;outline:none;}
  .search-input:focus{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
  .btn{padding:5px 12px;font-family:var(--ui);font-size:11px;font-weight:700;background:var(--accent);color:#000;border:none;cursor:pointer;text-transform:uppercase;}
  .btn:hover{opacity:0.88;}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}
  .status{font-size:10px;color:var(--muted);}
  .pbar{height:2px;background:var(--border-light);display:none;}
  .pbar.on{display:block;}
  .pfill{height:100%;background:var(--accent);transition:width .3s;}
  .wrap{padding:10px 12px;}
  .tbl-scroll{overflow-x:auto;background:var(--white);border:1px solid var(--border);}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  thead tr{background:var(--bg);}
  thead th{font-family:var(--ui);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);padding:7px 10px;text-align:left;border-bottom:2px solid var(--border);border-right:1px solid var(--border-light);cursor:pointer;user-select:none;white-space:nowrap;}
  thead th:last-child{border-right:none;}
  thead th:hover{background:var(--border-light);color:var(--text);}
  thead th.sa::after{content:' ↑';color:var(--accent-dark);}
  thead th.sd::after{content:' ↓';color:var(--accent-dark);}
  thead th.sa,thead th.sd{color:var(--accent-dark);background:var(--accent-bg);border-bottom-color:var(--accent);}
  tbody td{padding:6px 10px;border-bottom:1px solid var(--border-light);border-right:1px solid var(--border-light);vertical-align:middle;}
  tbody td:last-child{border-right:none;}
  tbody tr:hover td{background:#f8f8f5;}
  tbody tr:last-child td{border-bottom:none;}
  .cp{font-family:var(--ui);font-weight:600;font-size:13px;}
  .ct{font-size:9px;color:var(--muted2);margin-left:4px;}
  .cw{font-family:var(--ui);font-size:17px;font-weight:700;}
  .cn{font-variant-numeric:tabular-nums;color:var(--muted);}
  .cpct{font-family:var(--ui);font-size:13px;font-weight:700;}
  .hi{color:var(--accent-dark);}
  .md{color:var(--amber);}
  .lo{color:var(--muted2);}
  .bw{margin-top:3px;height:3px;max-width:70px;background:var(--border-light);}
  .bf{height:100%;}
  .foot{padding:7px 12px;font-size:9px;color:var(--muted2);border-top:1px solid var(--border-light);background:var(--white);display:flex;justify-content:space-between;}
  .foot a{color:var(--muted2);text-decoration:none;}
  .foot a:hover{color:var(--text);}
  .badge-pre{display:inline-block;font-family:var(--ui);font-size:9px;font-weight:700;padding:1px 5px;background:var(--accent-bg);border:1px solid var(--accent-dark);color:var(--accent-dark);margin-left:6px;}
</style>
</head>
<body>

<div class="hdr">
  <img src="https://cdn.vox-cdn.com/uploads/chorus_asset/file/23240520/Action_Network_Logo.png" class="an-logo" onerror="this.style.display='none'" alt="AN">
  <div class="hdr-title">Fanatics <em>Long Ball Jackpot</em> — Player Rankings</div>
  <div class="hdr-right">Baseball Savant · Statcast<br>Sorted by win rate</div>
</div>

<div class="ctrl">
  <span class="ctrl-lbl">Season</span>
  <select id="sel" onchange="onSeasonChange()">
    <option value="2025">2025 ★</option>
    <option value="2026">2026 (live)</option>
    <option value="2024">2024</option>
    <option value="custom">Custom range</option>
  </select>
  <span id="customCtrl" style="display:none;gap:8px;align-items:center;display:none">
    <span class="ctrl-lbl">From</span><input type="date" id="sd" value="2024-03-20">
    <span class="ctrl-lbl">To</span><input type="date" id="ed" value="2024-09-29">
  </span>
  <button class="btn" id="btn" onclick="run()">Load</button>
  <span class="status" id="st"></span>
</div>
<div class="pbar" id="pb"><div class="pfill" id="pf" style="width:0%"></div></div>

<div class="wrap" id="area" style="display:none">
  <div class="search-bar">
    <input class="search-input" id="search" type="text" placeholder="Search player…" oninput="render()">
  </div>
  <div class="tbl-scroll">
    <table>
      <thead><tr>
        <th onclick="sort('name')" data-k="name">Player</th>
        <th onclick="sort('wins')" data-k="wins">Wins</th>
        <th onclick="sort('win_pct')" data-k="win_pct" class="sd">Win %</th>
        <th onclick="sort('hr_days')" data-k="hr_days">HR days</th>
        <th onclick="sort('avg_dist')" data-k="avg_dist">Avg dist</th>
        <th onclick="sort('p90_dist')" data-k="p90_dist">p90 dist</th>
      </tr></thead>
      <tbody id="tb"></tbody>
    </table>
  </div>
</div>

<div class="foot">
  <span>Win % = wins ÷ total days · Baseball Savant Statcast data</span>
  <a href="https://www.actionnetwork.com" target="_blank">actionnetwork.com</a>
</div>

<script>
const REPO='https://petro438.github.io/Fanatics-Home-Run-Jackpot';
const PRE={'2025':REPO+'/data-2025.json?v=3','2026':REPO+'/data-2026.json?v=3'};
const SEASONS = {
  '2025':{s:'2025-03-27',e:'2025-09-28'},
  '2026':{s:'2026-03-27',e:'2026-09-30'},
  '2024':{s:'2024-03-20',e:'2024-09-29'},
};

let players=[], sk='win_pct', sa=false;

function onSeasonChange(){
  const v=document.getElementById('sel').value;
  const cc=document.getElementById('customCtrl');
  cc.style.display=v==='custom'?'flex':'none';
  if(v!=='custom'&&SEASONS[v]){
    document.getElementById('sd').value=SEASONS[v].s;
    document.getElementById('ed').value=SEASONS[v].e;
  }
}

async function run(){
  const sel=document.getElementById('sel').value;
  const btn=document.getElementById('btn');
  btn.disabled=true;
  document.getElementById('pb').classList.add('on');
  document.getElementById('area').style.display='none';
  document.getElementById('st').textContent='Loading…';
  document.getElementById('pf').style.width='20%';

  try{
    if(PRE[sel]){
      // Try pre-baked JSON first
      try{
        const r=await fetch(PRE[sel]);
        if(r.ok){
          const d=await r.json();
          players=d.players.filter(p=>p.hr_days>=2);
          document.getElementById('st').textContent=`${d.meta.days} days · ${d.meta.total_hrs} HRs · ${players.length} players · ★ pre-loaded`;
          document.getElementById('pf').style.width='100%';
          document.getElementById('area').style.display='block';
          render();
          btn.disabled=false;
          sendHeight();
          return;
        }
      }catch(e){}
    }
    // Fall back to live Savant fetch
    const s=document.getElementById('sd').value, e=document.getElementById('ed').value;
    await fetchLive(s,e);
  }catch(err){
    document.getElementById('st').textContent='⚠ '+err.message;
  }
  btn.disabled=false;
}

function savantUrl(s,e){
  const y=s.slice(0,4);
  return `https://baseballsavant.mlb.com/statcast_search/csv?all=true&hfPT=&hfAB=home_run%7C&hfGT=R%7C&hfBBT=&hfPR=&hfZ=&stadium=&hfBBL=&hfNewZones=&hfC=&hfSea=${y}%7C&hfSit=&player_type=batter&hfOuts=&opponent=&pitcher_throws=&batter_stands=&hfSA=&game_date_gt=${s}&game_date_lt=${e}&hfInfield=&team=&position=&hfOutfield=&hfRO=&home_road=&hfFlag=&hfPull=&metric_1=&hfInn=&min_pitches=0&min_results=0&group_by=name&sort_col=pitches&player_event_sort=h_launch_speed&sort_order=desc&min_abs=0&type=details`;
}

function chunks(s,e,days=30){
  const out=[],cur=new Date(s+'T12:00:00'),last=new Date(e+'T12:00:00');
  while(cur<=last){
    const ce=new Date(cur);ce.setDate(ce.getDate()+days-1);
    if(ce>last)ce.setTime(last.getTime());
    out.push({s:cur.toISOString().split('T')[0],e:ce.toISOString().split('T')[0]});
    cur.setDate(cur.getDate()+days);
  }
  return out;
}

function avgA(a){return a.length?Math.round(a.reduce((s,v)=>s+v,0)/a.length):0;}
function p90A(a){if(!a.length)return null;const s=[...a].sort((a,b)=>a-b);return s[Math.floor(s.length*.9)];}

async function fetchLive(start,end){
  const cs=chunks(start,end,30);
  let allRows=[];
  for(let i=0;i<cs.length;i++){
    const {s,e}=cs[i];
    document.getElementById('pf').style.width=Math.round(((i+1)/cs.length)*85)+'%';
    document.getElementById('st').textContent=`Fetching ${s} → ${e} (${i+1}/${cs.length})…`;
    let resp,att=0;
    while(att<3){try{resp=await fetch(savantUrl(s,e));if(resp.ok)break;}catch(err){}att++;if(att<3)await new Promise(r=>setTimeout(r,1500*att));}
    if(!resp||!resp.ok){continue;}
    const csv=await resp.text();
    if(!csv||csv.trim()[0]==='<')continue;
    const parsed=Papa.parse(csv,{header:true,skipEmptyLines:true});
    allRows=allRows.concat(parsed.data.filter(r=>r.events==='home_run'&&r.game_date&&parseInt(r.hit_distance_sc)>100));
    await new Promise(r=>setTimeout(r,300));
  }
  // Aggregate
  const byDate={},pmap={};
  for(const r of allRows){
    const date=r.game_date,dist=parseInt(r.hit_distance_sc);
    if(!date||!dist||dist<100)continue;
    const team=r.inning_topbot==='Top'?r.away_team:r.home_team;
    if(!byDate[date])byDate[date]=[];
    byDate[date].push({player:r.player_name||'?',pid:r.batter,team:team||'—',dist});
  }
  const days=Object.keys(byDate).length;
  for(const [,hrs] of Object.entries(byDate)){
    hrs.sort((a,b)=>b.dist-a.dist);
    const seen=new Set();
    hrs.forEach((h,i)=>{
      if(!h.pid)return;
      if(!pmap[h.pid])pmap[h.pid]={name:h.player,team:h.team,wins:0,hr_days:0,dists:[],wdists:[]};
      const p=pmap[h.pid];
      p.dists.push(h.dist);
      if(!seen.has(h.pid)){seen.add(h.pid);p.hr_days++;}
      if(i===0){p.wins++;p.wdists.push(h.dist);}
    });
  }
  players=Object.values(pmap).filter(p=>p.hr_days>=2).map(p=>({
    name:p.name,team:p.team,wins:p.wins,hr_days:p.hr_days,
    win_pct:+(p.wins/days*100).toFixed(1),
    avg_dist:avgA(p.dists),p90_dist:p90A(p.dists),
    max_dist:p.dists.length?Math.max(...p.dists):0,
  }));
  document.getElementById('pf').style.width='100%';
  document.getElementById('st').textContent=`${days} days · ${allRows.length} HRs · ${players.length} players`;
  document.getElementById('area').style.display='block';
  render();
  sendHeight();
}

function sort(k){
  if(sk===k)sa=!sa;else{sk=k;sa=k==='name';}
  document.querySelectorAll('thead th').forEach(t=>{
    t.classList.remove('sa','sd');
    if(t.dataset.k===k)t.classList.add(sa?'sa':'sd');
  });
  render();
}

function render(){
  const q=(document.getElementById('search')?.value||'').toLowerCase();
  const sorted=[...players].filter(p=>!q||p.name.toLowerCase().includes(q)).sort((a,b)=>{
    const av=a[sk]??0,bv=b[sk]??0;
    if(typeof av==='string')return sa?av.localeCompare(bv):bv.localeCompare(av);
    return sa?av-bv:bv-av;
  });
  const mx=Math.max(...sorted.map(p=>p.wins),1);
  document.getElementById('tb').innerHTML=sorted.map(p=>{
    const wr=typeof p.win_pct==='number'?p.win_pct.toFixed(1):p.win_pct;
    const cls=parseFloat(wr)>=10?'hi':parseFloat(wr)>=5?'md':'lo';
    const bc=parseFloat(wr)>=10?'var(--accent-dark)':parseFloat(wr)>=5?'var(--amber)':'var(--border)';
    const bw=Math.round((p.wins/mx)*100);
    return `<tr>
      <td><span class="cp">${p.name}</span><span class="ct">${p.team}</span></td>
      <td class="cw">${p.wins}</td>
      <td><div class="cpct ${cls}">${wr}%</div><div class="bw"><div class="bf" style="width:${bw}%;background:${bc}"></div></div></td>
      <td class="cn">${p.hr_days}</td>
      <td class="cn">${p.avg_dist||'—'} ft</td>
      <td class="cn">${p.p90_dist||'—'} ft</td>
    </tr>`;
  }).join('');
  sendHeight();
}

function sendHeight(){
  setTimeout(()=>{
    const h=document.documentElement.scrollHeight;
    window.parent.postMessage({type:'resize',height:h},'*');
  },100);
}

// Autoload 2025 data on page load
window.addEventListener('load', run);
</script>
</body>
</html>
